services:
  db:
    image: arangodb:latest
    healthcheck:
      test: ["CMD", "arangosh", "--javascript.execute-string", "'db._version()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s 
    volumes:
      - arango_data:/var/lib/arangodb3
    environment:
      - ARANGO_NO_AUTH=1
    expose:
      - 8529
    ports:
      - 8529:8529

volumes:
  arango_data:
